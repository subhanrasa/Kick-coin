<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App</title>
    <style>
        /* تنظیمات کلی */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e2d;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
        }

        /* هدر */
        .header {
            width: 100%;
            background-color: #2c2c3e;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid #444;
        }

        /* کانتینر اصلی */
        .container {
            flex: 1;
            padding: 20px;
            text-align: center;
        }

        /* تصویر کاربر */
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-top: 20px;
            border: 3px solid #ff7f50;
        }

        /* دکمه‌ها */
        .button {
            padding: 12px 24px;
            font-size: 16px;
            color: #fff;
            background-color: #ff7f50;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #ff5733;
        }
    </style>
</head>
<body>
    <!-- هدر -->
    <div class="header">Welcome to Mini App</div>

    <!-- کانتینر اصلی -->
    <div class="container">
        <!-- تصویر پروفایل کاربر -->
        <img id="profile-pic" class="profile-pic" src="" alt="Profile Picture" />
        <!-- نام کاربر -->
        <h1 id="welcome-message">Hello, User!</h1>
        <!-- دکمه‌ها -->
        <button class="button" onclick="performAction()">Click Me!</button>
    </div>

    <script>
        // Telegram Web App API
        const tg = window.Telegram.WebApp;

        // گسترش تمام صفحه
        tg.expand();

        // اطلاعات کاربر
        const user = tg.initDataUnsafe.user;

        // نمایش نام کاربر
        const welcomeMessage = document.getElementById('welcome-message');
        welcomeMessage.innerText = `Hello, ${user.first_name || "User"}!`;

        // نمایش تصویر پروفایل کاربر
        const profilePic = document.getElementById('profile-pic');
        if (user.photo_url) {
            profilePic.src = user.photo_url; // لینک تصویر از تلگرام
        } else {
            profilePic.style.display = 'none'; // اگر تصویر وجود نداشت، مخفی شود
        }

        // عملکرد دکمه
        function performAction() {
            tg.sendData("Button clicked!");
            alert("Action performed!");
        }
    </script>
</body>
</html>
